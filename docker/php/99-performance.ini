; Performance profile for Sail's CLI web server (artisan serve / php -S)
; This improves first-time and repeated page loading in local Docker environments.

opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=256
opcache.max_accelerated_files=32531
opcache.interned_strings_buffer=16

; Prefer speed over instant file change detection.
; Restart `laravel.test` after code updates when needed.
opcache.validate_timestamps=0
opcache.revalidate_freq=0

realpath_cache_size=4096K
realpath_cache_ttl=600

; Disable debugger overhead for request serving.
xdebug.mode=off
xdebug.start_with_request=no
